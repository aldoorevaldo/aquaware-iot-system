services:
  - type: web
    name: aquaware-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: ADMIN_PASSWORD
        value: aquaware-admin-123
      - key: DEVICE_API_KEY
        value: Aqua-Sensor-8257
      - key: SECRET_KEY
        generateValue: true
