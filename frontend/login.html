<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — AquaWare</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #0B1121;
    --neon-cyan: #06b6d4;
    --neon-blue: #3b82f6;
    --glass-bg: rgba(17, 24, 39, 0.7);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #f3f4f6;
    --text-muted: #9ca3af;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-base);
    background-image: 
      radial-gradient(at 0% 0%, rgba(6, 182, 212, 0.15) 0px, transparent 50%),
      radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 50%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-main);
  }
  .card {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
    margin: 0 16px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-blue));
  }
  h1 {
    font-family: 'Outfit', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(to right, #fff, #9ca3af);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p.sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }
  .input-group {
    margin-bottom: 20px;
  }
  label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    display: block;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input {
    width: 100%;
    padding: 12px 16px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    color: #fff;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    transition: all 0.3s ease;
  }
  input:focus {
    outline: none;
    border-color: var(--neon-cyan);
    box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2);
    background: rgba(0, 0, 0, 0.4);
  }
  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan));
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Outfit', sans-serif;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
  }
  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px -10px rgba(6, 182, 212, 0.5);
  }
  button:active {
    transform: translateY(0);
  }
  .error {
    color: var(--danger);
    font-size: 13px;
    margin-bottom: 16px;
    min-height: 18px;
    font-weight: 500;
    background: rgba(239, 68, 68, 0.1);
    padding: 8px 12px;
    border-radius: 8px;
    display: none;
  }
  .hint {
    font-size: 12px;
    color: rgba(156, 163, 175, 0.5);
    margin-top: 24px;
    text-align: center;
  }
  @media (max-width: 480px) {
    .card { padding: 32px 24px; }
    h1 { font-size: 24px; }
    p.sub { font-size: 12px; margin-bottom: 20px; }
  }
</style>
</head>
<body>
  <div class="card">
    <h1>AquaWare</h1>
    <p class="sub">Masuk untuk melihat dashboard monitoring air</p>
    <div class="error" id="errorBox"></div>
    <form id="loginForm">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" required autocomplete="username" placeholder="Masukkan username">
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit">Masuk ke Dashboard</button>
    </form>
    <div class="hint">Akun default: admin / (lihat log backend)</div>
  </div>

<script>
const API_BASE = "http://localhost:8000"; // PENTING: UBAH INI DENGAN URL RENDER ANDA NANTI (misal: "https://aquaware-api.onrender.com")

document.getElementById("loginForm").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const errorBox = document.getElementById("errorBox");
  errorBox.style.display = 'none';
  errorBox.textContent = "";
  
  const btn = e.target.querySelector('button');
  const originalText = btn.textContent;
  btn.textContent = 'Memproses...';
  btn.style.opacity = '0.7';

  try{
    const res = await fetch(`${API_BASE}/api/auth/login`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({username, password})
    });
    if(!res.ok){
      const err = await res.json();
      errorBox.textContent = err.detail || "Login gagal.";
      errorBox.style.display = 'block';
      btn.textContent = originalText;
      btn.style.opacity = '1';
      return;
    }
    const data = await res.json();
    localStorage.setItem("aquaware_token", data.token);
    localStorage.setItem("aquaware_user", data.username);
    window.location.href = "index.html";
  }catch(err){
    errorBox.textContent = "Tidak bisa terhubung ke server. Pastikan backend sudah jalan.";
    errorBox.style.display = 'block';
    btn.textContent = originalText;
    btn.style.opacity = '1';
  }
});
</script>
</body>
</html>
